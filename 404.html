<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Versicode</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header role="banner">
        <nav role="navigation" aria-label="Main site navigation">
            <a href="/" class="brand">versicode</a>
            <a href="mailto:info@versicode.com">Contact</a>
        </nav>
    </header>

    <main role="main" style="display: flex; flex-direction: column;">

        <section id="error-section" aria-label="Page not found">

            <div class="error-code" aria-label="404">
                <span class="shadow-layer layer1" aria-hidden="true">404</span>
                <span class="shadow-layer layer2" aria-hidden="true">404</span>
                <span class="shadow-layer layer3" aria-hidden="true">404</span>
                <span class="shadow-layer layer4" aria-hidden="true">404</span>
                <span class="shadow-layer layer5" aria-hidden="true">404</span>
                404
            </div>

            <p class="error-title">Page not found.</p>
            <p class="error-desc">
                Whatever you were looking for has drifted off into the void —
                or maybe it was never here to begin with.
            </p>

            <nav class="error-links" aria-label="Recovery options">
                <a href="/" class="primary">← Go home</a>
                <a href="https://github.com/famousStratum" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="mailto:info@versicode.com">Contact</a>
            </nav>

        </section>

    </main>

    <footer role="contentinfo">
        <p class="versicode-container">
            <span class="versicode-text">
                <span class="shadow-layer layer1">versicode</span>
                <span class="shadow-layer layer2">versicode</span>
                <span class="shadow-layer layer3">versicode</span>
                <span class="shadow-layer layer4">versicode</span>
                <span class="shadow-layer layer5">versicode</span>
                versicode
            </span>, code emanating through an
            <span class="om-symbol" id="om-trigger" aria-label="Trigger VERSICODE effect">ॐ</span>
        </p>
    </footer>

</body>

</html>
